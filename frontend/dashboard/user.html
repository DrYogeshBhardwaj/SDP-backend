<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - SDP</title>
    <link rel="stylesheet" href="../assets/css/theme.css">
    <style>
        .timer-display {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin: var(--spacing-md) 0;
        }

        .session-btn {
            flex: 1;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-md);
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <div class="card"
            style="display: flex; justify-content: space-between; align-items: center; padding: var(--spacing-md);">
            <h2 style="margin: 0; font-size: 1.25rem;">Welcome, <span id="user-name-display">User</span></h2>
            <button class="btn btn-secondary logout-btn" style="width: auto; padding: 0.5rem 1rem;">Logout</button>
        </div>

        <div id="error-message" class="alert alert-error"></div>
        <div id="success-message" class="alert alert-success"></div>

        <div class="dashboard-grid mt-2">
            <!-- Balance & Profile -->
            <div class="card">
                <h3>My Profile & Balance</h3>
                <p><strong>Mobile:</strong> <span id="profile-mobile">Loading...</span></p>
                <p><strong>Plan:</strong> <span id="profile-plan">Loading...</span></p>
                <div class="mt-2 p-2"
                    style="background: var(--background-color); border-radius: var(--border-radius); text-align: center; padding: var(--spacing-md);">
                    <h4>Minutes Balance</h4>
                    <div class="timer-display" style="color: var(--primary-color);" id="minutes-balance">0</div>
                </div>
            </div>

            <!-- Start Session -->
            <div class="card">
                <h3>Start Pause Session</h3>
                <p class="mb-2">Select a duration to begin your mindful pause.</p>

                <div id="session-options" style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
                    <button class="btn btn-primary session-btn" data-minutes="2">2 Minutes</button>
                    <button class="btn btn-primary session-btn" data-minutes="5">5 Minutes</button>
                    <button class="btn btn-primary session-btn" data-minutes="10">10 Minutes</button>
                </div>

                <div id="active-session" class="hidden text-center mt-2">
                    <h4>Session Active</h4>
                    <div class="timer-display" id="session-timer">00:00</div>
                    <p>Please do not close this window.</p>
                </div>
            </div>
        </div>

        <!-- Session History -->
        <div class="card mt-2">
            <h3>Recent Sessions</h3>
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; margin-top: var(--spacing-sm); min-width: 400px;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border-color); text-align: left;">
                            <th style="padding: 0.75rem 0.5rem;">Date</th>
                            <th style="padding: 0.75rem 0.5rem;">Duration</th>
                            <th style="padding: 0.75rem 0.5rem;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <tr>
                            <td colspan="3" class="text-center" style="padding: 1rem;">Loading history...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Centralized Utilities -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/user.js"></script>
</body>

</html>
