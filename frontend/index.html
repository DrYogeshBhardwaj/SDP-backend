<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaank Therapy | Clinical Mastery</title>
    <link rel="stylesheet" href="css/v1.css">
    <style>
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('med_ai_hero.png') center/cover no-repeat;
            opacity: 0.3;
            z-index: -1;
        }
        .hero h1 { 
            font-size: clamp(3rem, 10vw, 6rem); 
            margin-bottom: 1.5rem; 
            background: linear-gradient(to bottom, #fff, #00D8FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { max-width: 600px; margin-bottom: 2.5rem; font-size: 1.2rem; }
    </style>
</head>
<body class="scientific-grid">
    <div class="hero-bg"></div>
    <div class="scanline"></div>

    <section class="hero">
        <div class="card-title">Digital Bio-Resonance</div>
        <h1>SINAANK THERAPY</h1>
        <p>Precision frequency calibration for planetary alignment and neurological wellness. Clinical mastery, now on your primary mobile.</p>
        <button onclick="location.href='join.html'" class="btn-primary">Initialize Mastery</button>
    </section>

    <script>
        if (localStorage.getItem('session')) {
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
