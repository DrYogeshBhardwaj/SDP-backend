<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SM76B4W3PN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SM76B4W3PN');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaank Wellness | Demo Experience</title>
    <link rel="stylesheet" href="css/v1.css">
    <link rel="icon" type="image/png" href="Logo.png">
    
    <style>
        .auth-card {
            width: 400px;
            padding: 3rem;
            margin: 10vh auto;
            text-align: center;
        }
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glass);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-size: 1.2rem;
            margin: 1.5rem 0;
            outline: none;
            text-align: center;
        }
        .demo-hint {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 1.5rem;
            line-height: 1.5;
        }
    </style>
</head>
<body class="scientific-grid">
    <!-- Zen Loader -->
    <div id="zen-loader">
        <img src="Logo.png" class="loader-logo" alt="Sinaank">
        <div class="loader-text">Preparing Your Demo</div>
        <div class="loader-progress-bar">
            <div class="loader-progress-fill" id="loader-fill"></div>
        </div>
    </div>

    <div class="auth-card glass">
        <img src="Logo.png" alt="Sinaank Logo" style="width: 100px; height: auto; margin-bottom: 2rem; filter: drop-shadow(0 0 10px var(--primary-glow));">
        
        <div class="card-title">Sinaank Wellness</div>
        <h2 style="font-family: 'Hind', sans-serif;">Enter Mobile for Demo</h2>
        <p style="color: var(--text-dim); font-size: 0.9rem;">No OTP required for your first 3-min session.</p>
        
        <input type="tel" id="mobile" placeholder="98XXXXXXXX" maxlength="10">
        
        <button onclick="startDemo()" class="btn-primary glow-start" style="width: 100%; padding: 18px; font-size: 1rem;">START FREE DEMO 🌿</button>

        <div class="demo-hint">
            ✔ Instant Access<br>
            ✔ Free 3-Min Experience<br>
            ✔ Personalized Frequency
        </div>

        <p style="margin-top: 2.5rem; font-size: 0.8rem; color: var(--text-dim);">
            Already a member? <a href="join.html" style="color: var(--primary); text-decoration: underline;">Login here</a>
        </p>
    </div>

    <footer class="main-footer">
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="terms.html">Terms</a>
            <a href="privacy.html">Privacy</a>
        </div>
        <div class="copyright">
            Copyright © 2026 Sinaank Wellness.
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script>
        window.addEventListener('load', () => {
            const fill = document.getElementById('loader-fill');
            fill.style.width = '100%';
            setTimeout(() => {
                const loader = document.getElementById('zen-loader');
                if(loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 1000);
                }
            }, 600);
        });

        function startDemo() {
            const mobile = document.getElementById('mobile').value;
            if (mobile.length !== 10) {
                alert("Please enter a valid 10-digit mobile number.");
                return;
            }
            
            // Track demo start
            if (typeof gtag === 'function') {
                gtag('event', 'demo_start', { 'mobile': mobile });
            }

            // Redirect to therapy page in guest mode with mobile for personalization
            window.location.href = `therapy.html?mode=guest&mobile=${mobile}`;
        }
    </script>
</body>
</html>
