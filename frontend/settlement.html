<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaank Settlement Hub | Payout Security</title>
    <link rel="stylesheet" href="css/v1.css">
    <script src="js/config.js"></script>
    <style>
        .admin-layout { padding: 2rem; max-width: 1000px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-glass); }
        th { color: var(--primary); font-size: 0.8rem; text-transform: uppercase; }
        
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-pending { background: #ffab0022; color: #ffab00; }
        .badge-paid { background: #00c85322; color: #00c853; }
        .badge-rejected { background: #ff525222; color: #ff5252; }
        .badge-approved { background: #0091ea22; color: #0091ea; }

        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="scientific-grid">
    <!-- LOCK SCREEN -->
    <div id="lock-screen">
        <div class="card-title" style="font-size: 2rem; margin-bottom: 1rem;">SETTLEMENT ACCESS HUB</div>
        <p style="color: var(--text-dim); margin-bottom: 2rem; font-size: 0.8rem;">Enter your security credentials to manage payouts</p>
        
        <div id="lock-step-1" style="display: flex; flex-direction: column; align-items: center;">
            <input type="password" id="master-pass" placeholder="Enter Settlement Security Key" style="background: #111; border: 1px solid var(--border-glass); padding: 15px; color: #fff; text-align: center; font-size: 1.2rem; border-radius: 8px; width: 300px;">
            <button onclick="verifyMasterLock()" class="btn-primary" style="margin-top: 1rem; width: 300px;">VERIFY KEY</button>
        </div>

        <div id="lock-step-2" style="display: none; flex-direction: column; align-items: center;">
            <p style="color: var(--primary); margin-bottom: 1rem; font-weight: 700; font-size: 0.8rem; letter-spacing: 1px;">AUTHORIZATION REQUIRED: Enter OTP</p>
            <input type="number" id="admin-otp" placeholder="Enter OTP" style="background: #111; border: 1px solid var(--border-glass); padding: 15px; color: #fff; text-align: center; font-size: 1.2rem; border-radius: 8px; width: 300px;">
            <button onclick="verifyAdminMFA()" class="btn-primary" style="margin-top: 1rem; width: 300px;">AUTHORIZE ACCESS</button>
        </div>

        <p id="lock-msg" style="margin-top: 1rem; color: #ff5252;"></p>
    </div>

    <div class="admin-layout" id="main-layout" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; border-bottom: 1px solid var(--border-glass); padding-bottom: 1.5rem;">
            <div>
                <div class="card-title" style="font-size: 1.5rem;">SINAANK<br><span style="font-size: 0.7rem; color: var(--primary);">ACCOUNT SETTLEMENT HUB</span></div>
            </div>
            <div style="text-align: right;">
                <div id="cashier-name" style="font-weight: 700; font-size: 0.9rem;">--</div>
                <button onclick="logout()" style="background: transparent; color: #ff5252; border: none; font-size: 0.7rem; cursor: pointer; text-decoration: underline; padding: 0;">LOGOUT</button>
            </div>
        </header>

        <div class="dashboard-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 3rem;">
            <div class="stat-card glass" style="padding: 1.5rem;">
                <div class="card-title">Total Paid</div>
                <div id="stats-total-out" class="stat-value" style="font-size: 2rem; color: #00c853;">₹--</div>
            </div>
            <div class="stat-card glass" style="padding: 1.5rem;">
                <div class="card-title">Pending Liability</div>
                <div id="stats-liability" class="stat-value" style="font-size: 2rem; color: #ffab00;">₹--</div>
            </div>
            <div class="stat-card glass" style="padding: 1.5rem;">
                <div class="card-title">My Actions</div>
                <div id="stats-actions" class="stat-value" style="font-size: 2rem; color: var(--primary);">--</div>
            </div>
        </div>

        <div class="view active">
            <h2 style="margin-bottom: 1.5rem;">Pending Payout Requests</h2>
            <div class="stat-card glass" style="padding: 0; overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>User Mobile</th>
                            <th>Amount & UPI ID</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="payout-table-body">
                        <tr><td colspan="5" style="text-align: center; padding: 3rem; color: var(--text-dim);">Loading payouts...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function verifyMasterLock() {
            const password = document.getElementById('master-pass').value;
            const msg = document.getElementById('lock-msg');
            msg.innerText = "Verifying...";
            
            try {
                const res = await fetch(CONFIG.API_BASE_URL + '/api/admin/verify-master', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                
                if (data.success && data.data.mfaRequired) {
                    localStorage.setItem('admin_mfa_sessionId', data.data.sessionId);
                    document.getElementById('lock-step-1').style.display = 'none';
                    document.getElementById('lock-step-2').style.display = 'flex';
                    msg.innerText = "";
                } else {
                    msg.innerText = data.message || "INVALID KEY";
                }
            } catch (e) { msg.innerText = "Connection Error"; }
        }

        async function verifyAdminMFA() {
            const otp = document.getElementById('admin-otp').value;
            const sessionId = localStorage.getItem('admin_mfa_sessionId');
            const msg = document.getElementById('lock-msg');
            msg.innerText = "Authorizing...";

            try {
                const res = await fetch(CONFIG.API_BASE_URL + '/api/admin/verify-mfa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp, sessionId })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('session', data.data.token);
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('main-layout').style.display = 'block';
                    sessionStorage.setItem('cashier_unlocked', 'true');
                    init();
                } else {
                    msg.innerText = data.message || "INVALID OTP";
                }
            } catch (e) { msg.innerText = "Verification Failed"; }
        }

        if (sessionStorage.getItem('cashier_unlocked') === 'true') {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-layout').style.display = 'block';
            init();
        }

        async function init() {
            await loadStats();
            await loadPayouts();
        }

        async function api(path, method = 'GET', body = null) {
            const token = localStorage.getItem('session');
            const options = {
                method,
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(CONFIG.API_BASE_URL + '/api/admin' + path, options);
            if (res.status === 401 || res.status === 403) {
                alert("Unauthorized: Access Denied");
                logout();
            }
            return await res.json();
        }

        async function loadStats() {
            const data = await api('/stats');
            if (data.success) {
                const s = data.data.wholesale;
                document.getElementById('stats-total-out').innerText = '₹' + s.totalOut;
                document.getElementById('stats-liability').innerText = '₹' + s.totalLiability;
                document.getElementById('stats-actions').innerText = s.recentTransactions;
            }
        }

        async function loadPayouts() {
            const data = await api('/payouts');
            if (data.success) {
                const pending = data.data.filter(p => p.status === 'PENDING' || p.status === 'APPROVED');
                if (pending.length === 0) {
                    document.getElementById('payout-table-body').innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 3rem; color: var(--text-dim);">No pending payouts to process. All clear!</td></tr>`;
                    return;
                }

                document.getElementById('payout-table-body').innerHTML = pending.map(p => `
                    <tr>
                        <td>${formatDate(p.createdAt)}</td>
                        <td>${p.user.mobile}</td>
                        <td>
                            <div style="font-weight: 800; font-size: 1.1rem;">₹${p.amount}</div>
                            <div style="color: var(--primary); font-family: monospace; font-size: 0.8rem;">UPI: ${p.user.upiId || 'NOT SET'}</div>
                        </td>
                        <td><span class="badge badge-${p.status.toLowerCase()}">${p.status}</span></td>
                        <td>
                            ${p.status === 'PENDING' ? `
                                <button onclick="processPayout('${p.id}', 'APPROVED')" class="btn-primary" style="padding: 6px 12px; font-size:0.7rem; background:#0091ea;">APPROVE</button>
                            ` : `
                                <button onclick="processPayout('${p.id}', 'PAID')" class="btn-primary" style="padding: 6px 12px; font-size:0.7rem; background:#00c853; color:#000;">CONFIRM PAID</button>
                            `}
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function processPayout(id, status) {
            let transactionId = null;
            if (status === 'PAID') {
                transactionId = prompt("Enter Transaction ID / UTR Number from your UPI App:");
                if (!transactionId) return;
            } else {
                if(!confirm('Move to ' + status + '?')) return;
            }

            const btn = event.target;
            btn.innerText = "WAIT...";
            btn.disabled = true;

            const data = await api('/payout/' + id, 'PUT', { status, transactionId });
            if (data.success) {
                alert(`Payout marked as ${status}!`);
                init();
            } else {
                alert("Error: " + data.message);
                btn.innerText = status;
                btn.disabled = false;
            }
        }

        function formatDate(dateStr) {
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            const d = new Date(dateStr);
            return `${d.getDate()}-${months[d.getMonth()]}-${d.getFullYear()}`;
        }

        function logout() {
            localStorage.clear();
            sessionStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
