<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporarily Test OTP Flow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .hidden {
            display: none;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        .error {
            color: #dc3545;
        }

        .success {
            color: #28a745;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Temp OTP Tester</h2>
        <p>Test your 2Factor SMS Live</p>

        <!-- Send OTP Section -->
        <div id="step-1">
            <input type="text" id="mobile" placeholder="Enter 10-digit Mobile Number" value="9211755211" maxlength="10">
            <button id="btn-send">Send Live SMS OTP</button>
        </div>

        <!-- Verify OTP Section -->
        <div id="step-2" class="hidden">
            <p>SMS Sent! Enter OTP below:</p>
            <input type="text" id="otp" placeholder="Enter OTP from SMS" maxlength="6">
            <button id="btn-verify">Verify OTP</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:5000';
        let currentSessionId = '';
        let currentMobile = '';

        const statusDiv = document.getElementById('status');
        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');

        document.getElementById('btn-send').addEventListener('click', async () => {
            currentMobile = document.getElementById('mobile').value;
            statusDiv.textContent = 'Sending...';
            statusDiv.className = '';

            try {
                const res = await fetch(`${BASE_URL}/api/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: currentMobile })
                });

                const data = await res.json();

                if (res.ok) {
                    currentSessionId = data.data.sessionId;
                    statusDiv.textContent = 'SMS sent successfully!';
                    statusDiv.className = 'success';
                    step1.classList.add('hidden');
                    step2.classList.remove('hidden');
                } else {
                    statusDiv.textContent = data.message || 'Failed to send SMS.';
                    statusDiv.className = 'error';
                }
            } catch (err) {
                statusDiv.textContent = 'Network error catching API.';
                statusDiv.className = 'error';
            }
        });

        document.getElementById('btn-verify').addEventListener('click', async () => {
            const otp = document.getElementById('otp').value;
            statusDiv.textContent = 'Verifying...';
            statusDiv.className = '';

            try {
                const res = await fetch(`${BASE_URL}/api/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: currentMobile, otp, sessionId: currentSessionId })
                });

                const data = await res.json();

                if (res.ok) {
                    statusDiv.innerHTML = `✅ <b>OTP Verified!</b><br>User Exists: ${data.data.userExists}`;
                    statusDiv.className = 'success';
                } else {
                    statusDiv.textContent = data.message || 'Invalid OTP!';
                    statusDiv.className = 'error';
                }
            } catch (err) {
                statusDiv.textContent = 'Network error verifying API.';
                statusDiv.className = 'error';
            }
        });
    </script>

</body>

</html>
