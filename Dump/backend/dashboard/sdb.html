<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaank Digital Therapy</title>
    <script src="../public/js/i18n.js"></script>
    <script>
    (function() {
        // Mandatory Session Guard
        const _sess = localStorage.getItem("ssb_session");
        const _tok = localStorage.getItem("token");
        if (!_sess || !_tok) {
            window.location.href = "/join.html";
        }
    })();
        if (!sessionStorage.getItem("sinaank_intro")) {
            window.location.href = "/dashboard/therapy.html";
        }
    </script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .wrapper-exit {
            position: fixed; top: 1.5rem; right: 1.5rem; z-index: 10001;
            background: rgba(15, 23, 42, 0.6); color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.2); padding: 0.6rem 1.2rem;
            border-radius: 50px; cursor: pointer; font-family: 'Inter', sans-serif;
            text-decoration: none; font-size: 0.9rem; font-weight: 600;
            backdrop-filter: blur(10px); transition: 0.2s;
        }
        .wrapper-exit:hover { background: rgba(15, 23, 42, 0.9); color: white; border-color: white; }
    </style>
</head>
<body>
    <a href="therapy.html" class="wrapper-exit" data-i18n="therapy.exit">✕ Exit to Hub</a>
    <iframe src="../public/therapy-breathing.html" allow="autoplay; accelerometer; gyroscope;"></iframe>
</body>
</html>
