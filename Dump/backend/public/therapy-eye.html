<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINAANK Digital Eye Relax (SDE)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/theme-engine.js"></script>
    <script src="js/sde_engine.js"></script>
    <script src="js/personal_start_engine.js"></script>
    <script src="js/focus-ui.js"></script>
    <script src="js/i18n.js"></script>
    <style>
        :root { --sdp-bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #94a3b8; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Setup Screen */
        #setup-ui { text-align: center; padding: 2rem; max-width: 400px; z-index: 100; transition: opacity 1s; }
        .branding { text-transform: uppercase; letter-spacing: 4px; font-size: 0.8rem; font-weight: 700; color: #a855f7; margin-bottom: 1rem; }
        h1 { font-size: 2.2rem; color: #f8fafc; font-weight: 300; margin-bottom: 2rem; }
        .description { color: #94a3b8; font-size: 1rem; margin-bottom: 2.5rem; line-height: 1.6; }
        .btn-start { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; border: none; padding: 1.2rem; border-radius: 50px; font-size: 1.2rem; font-weight: 600; cursor: pointer; width: 100%; box-shadow: 0 10px 25px -5px rgba(168, 85, 247, 0.4); }

        /* Focus UI Container */
        #therapy-ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; }
        .hidden { display: none !important; }
        .fade-out { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body>
    <div id="setup-ui">
        <div class="branding" data-i18n="therapy.sde.title_internal">SINAANK Digital Eye Relax</div>
        <h1 data-i18n="therapy.sde.h1">SDE Eye Relax</h1>
        <div class="description" data-i18n="therapy.sde.desc_internal">Passive eye recovery in Focus Mode. Disconnect and let your ocular focus recalibrate.</div>
        <button class="btn-start" onclick="beginEyeRelax()" data-i18n="therapy.setup.start">Start SID Session</button>
        <div style="margin-top: 2rem; font-size: 0.8rem; color: #475569;" data-i18n="therapy.setup.headphones">🎧 Headphones recommended</div>
    </div>

    <div id="therapy-ui"></div>

    <script>
        async function beginEyeRelax() {
            try {
                document.getElementById('setup-ui').classList.add('fade-out');
                // Start Engine and get metadata
                const session = await SDEEngine.start();
                if (!session) return;

                setTimeout(() => {
                    document.getElementById('setup-ui').classList.add('hidden');
                    FocusUIController.setup(session.moduleId, session.startText, session.metadata);
                }, 1000);
            } catch (e) {
                console.error(e);
                document.getElementById('setup-ui').classList.remove('fade-out');
            }
        }

        window.addEventListener('popstate', () => { if (SDEEngine.isPlaying) SDEEngine.stop(); });
    </script>
</body>
</html>
