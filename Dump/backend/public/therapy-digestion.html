<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINAANK Focus Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/theme-engine.js"></script>
    <script src="js/sdd_engine.js"></script>
    <script src="js/personal_start_engine.js"></script>
    <script src="js/focus-ui.js"></script>
    <script src="js/i18n.js"></script>
    <style>
        :root { --sdp-bg: #000; --sdp-accent: #f59e0b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #94a3b8; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Setup Screen */
        #setup-ui { text-align: center; padding: 2rem; max-width: 400px; z-index: 100; transition: opacity 1s; }
        .branding { text-transform: uppercase; letter-spacing: 4px; font-size: 0.8rem; font-weight: 700; color: #f59e0b; margin-bottom: 1rem; }
        h1 { font-size: 2.2rem; color: #f8fafc; font-weight: 300; margin-bottom: 2rem; }
        .warning { color: #fbbf24; font-size: 0.9rem; margin-bottom: 2rem; background: rgba(251, 191, 36, 0.05); padding: 1rem; border-radius: 12px; }
        .mode-selection { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .mode-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 1.5rem; border-radius: 20px; color: white; cursor: pointer; transition: all 0.3s ease; text-align: left; }
        .mode-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: #f59e0b; transform: translateY(-3px); }
        .mode-btn.active { background: rgba(245, 158, 11, 0.2); border-color: #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); }
        .mode-btn h3 { margin-bottom: 0.5rem; font-size: 1.2rem; color: #f8fafc; }
        .mode-btn p { font-size: 0.9rem; color: #94a3b8; line-height: 1.4; }

        .btn-start { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; padding: 1.2rem; border-radius: 50px; font-size: 1.2rem; font-weight: 600; cursor: pointer; width: 100%; box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.4); }

        /* Focus UI Container */
        #therapy-ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; }
        .hidden { display: none !important; }
        .fade-out { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body>
    <div id="setup-ui">
        <div class="branding" data-i18n="therapy.sdd.title_internal">SINAANK Digital Digestion</div>
        <h1 data-i18n="therapy.sdd.h1">SDD Digestion</h1>
        <div class="warning" data-i18n="therapy.setup.warning_digestion">Start at least 10 minutes after meals.</div>
        <div class="mode-selection">
            <div class="mode-btn active" id="mode-sit" onclick="selectMode('sitting')">
                <h3 data-i18n="therapy.sdd.mode_sitting">Sit & Relax</h3>
                <p data-i18n="therapy.sdd.mode_sitting_desc">Vajrasana posture for digestion support.</p>
            </div>
            <div class="mode-btn" id="mode-walk" onclick="selectMode('walking')">
                <h3 data-i18n="therapy.sdd.mode_walking">Walk & Relax</h3>
                <p data-i18n="therapy.sdd.mode_walking_desc">Slow walk with SID ambient sound.</p>
            </div>
        </div>
        <button class="btn-start" onclick="beginDigestion()" data-i18n="therapy.setup.start">Start SID Session</button>
        <div style="margin-top: 2rem; font-size: 0.8rem; color: #475569;" data-i18n="therapy.setup.headphones">🎧 Headphones recommended</div>
    </div>

    <div id="therapy-ui"></div>

    <script>
        let selectedMode = 'sitting';
        function selectMode(m) {
            selectedMode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + (m === 'sitting' ? 'sit' : 'walk')).classList.add('active');
        }

        async function beginDigestion() {
            try {
                document.getElementById('setup-ui').classList.add('fade-out');
                // Start Engine and get metadata
                const session = await SDDEngine.start(selectedMode);
                if (!session) return;

                setTimeout(() => {
                    document.getElementById('setup-ui').classList.add('hidden');
                    FocusUIController.setup(session.moduleId, session.startText, session.metadata);
                }, 1000);
            } catch (e) {
                console.error(e);
                document.getElementById('setup-ui').classList.remove('fade-out');
            }
        }

        window.addEventListener('popstate', () => { if (SDDEngine.isPlaying) SDDEngine.stop(); });
    </script>
</body>
</html>
