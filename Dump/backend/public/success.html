<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | SINAANK</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/i18n.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --background: #f8fafc;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100 vh;
            margin: 0;
            overflow: hidden;
        }
        .success-card {
            background: white;
            padding: 4rem 2rem;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .icon-box {
            width: 100px;
            height: 100px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: var(--success);
            font-size: 3rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; color: #0f172a; }
        p { color: #64748b; margin-bottom: 2.5rem; line-height: 1.6; }
        .btn-dashboard {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 1.25rem 2.5rem;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn-dashboard:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); }
        .redirect-text { font-size: 0.8rem; color: #94a3b8; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon-box">✓</div>
        <h1 data-i18n="success.title">Payment Successful!</h1>
        <p data-i18n="success.desc">Your SINAANK Digital Therapy plan has been activated. Welcome to the future of neural wellbeing.</p>
        
        <a href="dashboard/dashboard.html" class="btn-dashboard" data-i18n="success.btn">Go to Dashboard</a>
        
        <div class="redirect-text" data-i18n="success.redirect">Redirecting automatically in 5 seconds...</div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'dashboard/dashboard.html';
        }, 5000);
    </script>
</body>
</html>
