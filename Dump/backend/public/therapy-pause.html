<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaank Digital Therapy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/theme-engine.js"></script>
    <script src="js/sdp_engine.js"></script>
    <script src="js/personal_start_engine.js"></script>
    <script src="js/focus-ui.js"></script>
    <script src="js/i18n.js"></script>
    <style>
        :root { --sdp-bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #94a3b8; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Setup Screen */
        #setup-ui { text-align: center; padding: 2rem; max-width: 400px; z-index: 100; transition: opacity 1s; }
        .branding { text-transform: uppercase; letter-spacing: 4px; font-size: 0.8rem; font-weight: 700; color: #94a3b8; margin-bottom: 1rem; }
        h1 { font-size: 2.2rem; color: #f8fafc; font-weight: 300; margin-bottom: 2rem; }
        .description { color: #64748b; font-size: 1rem; margin-bottom: 2.5rem; line-height: 1.6; }
        .btn-start { background: #f8fafc; color: #000; border: none; padding: 1.2rem; border-radius: 50px; font-size: 1.2rem; font-weight: 600; cursor: pointer; width: 100%; box-shadow: 0 10px 25px -5px rgba(255, 255, 255, 0.2); }

        /* Focus UI Container */
        #therapy-ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; }
        .hidden { display: none !important; }
        .fade-out { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body>
    <div id="setup-ui">
        <div class="branding" data-i18n="therapy.sdm.title_internal">Sinaank Digital Therapy</div>
        <h1 data-i18n="therapy.sdp.h1">Sinaank Digital Therapy</h1>
        <div class="description" data-i18n="therapy.sdp.desc_internal">Neutral mental reset in Focus Mode. Disconnect from digital inputs and embrace micro-silence.</div>
        <button class="btn-start" onclick="beginPause()" data-i18n="therapy.setup.start">Start SID Session</button>
        <div style="margin-top: 2rem; font-size: 0.8rem; color: #475569;" data-i18n="therapy.setup.headphones">🎧 Headphones recommended</div>
    </div>

    <div id="therapy-ui"></div>

    <script>
        async function beginPause() {
            const mobile = ThemeEngine.getMobile();
            if(!mobile || mobile === '0000000000') { location.href = '/login.html'; return; }

            document.getElementById('setup-ui').classList.add('fade-out');
            
            // Start Engine and get metadata
            const session = await SDPEngine.start();
            
            setTimeout(() => {
                document.getElementById('setup-ui').classList.add('hidden');
                FocusUIController.setup(session.moduleId, session.startText, session.metadata);
            }, 1000);
        }

        window.addEventListener('popstate', () => { if (SDPEngine.isPlaying) SDPEngine.stop(); });
    </script>
</body>
</html>
