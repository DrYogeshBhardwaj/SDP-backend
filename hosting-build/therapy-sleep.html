<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINAANK SDS</title>
<script src="js/i18n.js"></script>

<style>
html,body{
margin:0;
height:100%;
background:#03130c;
overflow:hidden;
}

#orb{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:180px;
height:180px;
border-radius:50%;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 80px rgba(0,255,150,.15);
animation:pulse 4s infinite ease-in-out;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.2)}
100%{transform:translate(-50%,-50%) scale(1)}
}

#end{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
color:#9aa;
font-size:12px;
letter-spacing:3px;
}
</style>
</head>

<body>

<div id="orb"></div>
<div id="end" data-i18n="therapy.exit">END SESSION</div>

<script>

let audioStarted=false

async function startSDSAudio(){

if(audioStarted) return
audioStarted=true

try {
    const startSound = new Audio('/assets/audio/common/therapy_start.mp3');
    startSound.volume = 1.0;
    
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') await ctx.resume();
    
    await startSound.play();
    console.log("[Audio] Sleep Start Sound Played");

    const gain=ctx.createGain()
    gain.gain.value=0.1
    
    // --- FINAL AUDIO BOOST FIX ---
    const boostNode = ctx.createGain();
    boostNode.gain.value = 2.5; // Speaker boost
    gain.connect(boostNode);
    boostNode.connect(ctx.destination);
    // ------------------------------

const oscL=ctx.createOscillator()
const oscR=ctx.createOscillator()

oscL.frequency.value=232
oscR.frequency.value=235

const panL=ctx.createStereoPanner()
const panR=ctx.createStereoPanner()

panL.pan.value=-1
panR.pan.value=1

oscL.connect(panL)
oscR.connect(panR)

panL.connect(gain)
panR.connect(gain)

oscL.start()
oscR.start()

// voice
const voice=new SpeechSynthesisUtterance(
    window._t('focus.relax')
)

voice.rate=.85
voice.pitch=.7

speechSynthesis.cancel()
speechSynthesis.speak(voice)

console.log("SDS AUDIO STARTED")

} catch (err) {
    console.warn("[Audio] Sleep Audio failed", err);
}

}

// IMPORTANT: hook into your SDS engine
window.beginSession = (function(original){

return function(){

startSDSAudio()

if(original) original()

}

})(window.beginSession)

// fallback
document.addEventListener("click",startSDSAudio,{once:true})
document.addEventListener("touchstart",startSDSAudio,{once:true})

</script>

</body>
</html>
