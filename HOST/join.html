<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaank Therapy | Access Hub</title>
    <link rel="stylesheet" href="css/v1.css">
    <link rel="icon" type="image/png" href="Logo.png">
    <script src="js/config.js"></script>

    <style>
        .auth-card {
            width: 400px;
            padding: 3rem;
            margin: 10vh auto;
            text-align: center;
        }
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glass);
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            margin: 1.5rem 0;
            outline: none;
            text-align: center;
        }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body class="scientific-grid">
    <!-- Zen Loader -->
    <div id="zen-loader">
        <img src="Logo.png" class="loader-logo" alt="Sinaank">
        <div class="loader-text">Finding Your Balance</div>
        <div class="loader-progress-bar">
            <div class="loader-progress-fill" id="loader-fill"></div>
        </div>
    </div>
    <div class="auth-card glass">
        <img src="Logo.png" alt="Sinaank Logo" style="width: 100px; height: auto; margin-bottom: 2rem; filter: drop-shadow(0 0 10px var(--primary-glow));">
        
        <!-- STEP 1: MOBILE ENTRY -->

        <div id="step-mobile" class="step">
            <div class="card-title">Sinaank Therapy</div>
            <h2>Enter Mobile</h2>
            <input type="tel" id="mobile" placeholder="98XXXXXXXX" maxlength="10" oninput="resetOTPBtn()">
            <button id="otp-btn" onclick="sendOTP()" class="btn-primary" style="width: 100%;">Get OTP</button>
        </div>

        <!-- STEP 2: OTP VERIFICATION -->
        <div id="step-otp" class="step">
            <div class="card-title">Security Gateway</div>
            <h2 style="font-size: 1.2rem; line-height: 1.4;">2 मिनट की therapy शुरू करने के लिए OTP डालें</h2>
            <input type="number" id="otp" placeholder="XXXXXX">
            <button onclick="verifyOTP()" class="btn-primary" style="width: 100%;">Authorize</button>
            <div style="font-size: 0.7rem; color: #a5d6a7; margin-top: 1rem; line-height: 1.5; opacity: 0.8;">
                ✔ आपका नंबर सुरक्षित है<br>
                ✔ कोई spam नहीं होगा
            </div>
            <p style="margin-top: 1.5rem; cursor: pointer; text-decoration: underline; font-size: 0.8rem; color: var(--text-dim);" onclick="goBackToMobile()">⬅ वापस जाएं (Change Mobile)</p>
        </div>
        
        <p id="msg" style="margin-top: 1.5rem; font-size: 0.9rem;"></p>
    </div>

    <script>
        window.addEventListener('load', () => {
            const fill = document.getElementById('loader-fill');
            fill.style.width = '100%';
            setTimeout(() => {
                const loader = document.getElementById('zen-loader');
                if(loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 1000);
                }
            }, 600);
        });

        const urlParams = new URLSearchParams(window.location.search);
        const urlMobile = urlParams.get('mobile');

        // Logic to show correct step on load
        if (urlMobile) {
            document.getElementById('step-otp').classList.add('active');
        } else {
            document.getElementById('step-mobile').classList.add('active');
        }

        function resetOTPBtn() {
            const btn = document.getElementById('otp-btn');
            if (btn) {
                btn.innerText = "Get OTP";
                btn.style.background = ""; // Reset to CSS default
            }
        }

        async function sendOTP() {
            const mobile = document.getElementById('mobile').value;
            if (mobile.length !== 10) return showMsg("Invalid Mobile", "error");
            
            const btn = document.getElementById('otp-btn');
            if (btn.innerText === "LOGIN ANYWAY") {
                return actualSendOTP(mobile);
            }

            showMsg("Checking Mobile Status...");
            try {
                const checkRes = await fetch(CONFIG.API_BASE_URL + '/api/check-mobile', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mobile })
                });
                
                if (!checkRes.ok) {
                    console.log("Check API not found, proceeding to OTP directly.");
                    return actualSendOTP(mobile);
                }

                const checkData = await checkRes.json();
                
                if (checkData.success && checkData.data.exists && urlParams.get('ref')) {
                    showMsg(`${mobile} is already registered! 🙏`, "success");
                    btn.innerText = "CONTINUE TO THERAPY";
                    btn.style.background = "#00c853"; 
                    return;
                }

                actualSendOTP(mobile);
            } catch (e) { showMsg("Connection Error", "error"); }
        }

        async function actualSendOTP(mobile) {
            showMsg("Establishing Secure Connection...");
            try {
                const res = await fetch(CONFIG.API_BASE_URL + '/api/send-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mobile })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('sessionId', data.data.sessionId);
                    window.location.href = `join.html?mobile=${mobile}`;
                } else {
                    showMsg(data.message || "Failed to send OTP", "error");
                }
            } catch (e) { showMsg("Network Error", "error"); }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp').value;
            if (!otp) return showMsg("Please enter OTP", "error");
            
            const sessionId = localStorage.getItem('sessionId');
            
            showMsg('Authorizing Identity...');
            try {
                const res = await fetch(CONFIG.API_BASE_URL + '/api/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mobile: urlMobile, otp, sessionId })
                });
                const data = await res.json();
                
                if (data.success) {
                    showMsg('Therapy शुरू हो रही है...', 'success');
                    setTimeout(() => {
                        if (data.data.exists) {
                            return performLogin(urlMobile);
                        } else {
                            // NEW USER -> REGISTER AS FREE AND GO TO DASHBOARD
                            return performQuickRegister(urlMobile);
                        }
                    }, 1000);
                } else {
                    showMsg('⚠️ OTP सही नहीं है, फिर से कोशिश करें', 'error');
                }
            } catch (e) { showMsg('Verification failed', 'error'); }
        }

        async function performQuickRegister(mobile) {
            showMsg('Creating Account...');
            try {
                const res = await fetch(CONFIG.API_BASE_URL + '/api/power-register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mobile, name: 'Sinaank User' })
                });
                const data = await res.json();
                if (data.success) {
                    // Track Signup Event
                    if (typeof gtag === 'function') {
                        gtag('event', 'signup');
                        if (localStorage.getItem('refCode')) {
                            gtag('event', 'referral_join');
                        }
                    }
                    localStorage.setItem('session', data.data.token);
                    localStorage.setItem('mobile', mobile);
                    window.location.href = "dashboard.html";
                } else {
                    showMsg(data.message || "Registration failed", "error");
                }
            } catch (e) { showMsg("Network Error", "error"); }
        }

        async function performLogin(mobile, force = false) {
            if (!mobile) return showMsg('Mobile number missing', 'error');
            showMsg('Accessing Identity...');
            try {
                const res = await fetch(CONFIG.API_BASE_URL + '/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mobile, force })
                });
                const data = await res.json();
                
                if (data.message === 'ALREADY_LOGGED_IN') {
                    if (confirm(data.data.message)) {
                        return performLogin(mobile, true);
                    } else {
                        showMsg('Login cancelled. Please logout from other devices.', 'error');
                        return;
                    }
                }

                if (data.success) {
                    localStorage.setItem('session', data.data.token);
                    localStorage.setItem('mobile', mobile);
                    window.location.href = "dashboard.html";
                } else {
                    showMsg(data.message || 'Login failed', 'error');
                }
            } catch (e) {
                console.error('Login Error:', e);
                showMsg('Connection Failed', 'error');
            }
        }




        function showMsg(m, type='') {
            const el = document.getElementById('msg');
            el.innerText = m;
            el.style.color = type === 'error' ? '#ff5252' : '#00c853';
        }

        function goBackToMobile() {
            const ref = localStorage.getItem('refCode');
            window.location.href = ref ? `join.html?ref=${ref}` : 'join.html';
        }

        // Handle referral in URL
        const refCode = urlParams.get('ref');
        if (refCode) {
            localStorage.setItem('refCode', refCode);
            // UI adjustment for referral mode
            document.querySelectorAll('.card-title').forEach(el => el.innerText = "Sinaank Wellness Hub");
            const h2 = document.querySelector('#step-mobile h2');
            if (h2) h2.innerText = "Start Experience";
            const btn = document.getElementById('otp-btn');
            if (btn) btn.innerText = "Start Now";
        }
    </script>
    <footer class="main-footer">
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="terms.html">Terms & Conditions</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="dashboard.html">Member Hub</a>
        </div>
        <div class="copyright">
            Copyright © 2026 Sinaank Therapy. All Rights Reserved.
        </div>
    </footer>
<script src="js/analytics.js"></script>
</body>
</html>
