<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaank Therapy | Now Heal your Aura digitally</title>
    <link rel="stylesheet" href="css/v1.css">
    <link rel="icon" type="image/png" href="Logo.png">
    <!-- Hindi & English Optimized Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Hind:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-blue: #00D8FF;
            --brand-orange: #FF6A00;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0a20 0%, #000 100%);
        }
        
        /* Animated Planets & Energy Background */
        .aura-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 216, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: pulse-aura 8s infinite ease-in-out;
            z-index: 1;
        }
        @keyframes pulse-aura {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            padding: 4rem 1rem;
        }

        .top-label {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--brand-blue);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .hero h1 { 
            font-size: clamp(3.5rem, 12vw, 7rem); 
            margin: 0;
            line-height: 1;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 30%, var(--brand-blue) 70%, var(--brand-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 216, 255, 0.3));
        }

        .tagline {
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            margin: 1.5rem 0 2.5rem;
            font-weight: 300;
            color: #fff;
            opacity: 0.9;
        }

        .feature-pills {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        .pill {
            padding: 8px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 216, 255, 0.2);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--brand-blue);
        }

        .btn-start {
            padding: 20px 60px;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--brand-blue), var(--brand-orange));
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 40px rgba(0, 216, 255, 0.3);
            letter-spacing: 2px;
        }
        .btn-start:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 50px rgba(255, 106, 0, 0.4);
        }

        .floating-elements {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .planet {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="scientific-grid">
    <div class="scanline"></div>

    <section class="hero" style="height: auto; min-height: 100vh;">
        <div class="aura-glow"></div>
        
        <div class="hero-content">
            <img src="Logo.png" alt="Sinaank Logo" style="width: 150px; height: auto; margin-bottom: 2rem; filter: drop-shadow(0 0 20px rgba(0, 216, 255, 0.4));">
            <div class="top-label" style="color: #fff; background: rgba(0,216,255,0.1); padding: 5px 15px; border-radius: 50px; display: inline-block; margin-bottom: 2rem;">सीनांक थेरेपी | Sinaank Therapy</div>
            <h1>2 मिनट में<br><span style="color: var(--brand-blue);">अनुभव करें</span></h1>

            <div class="tagline">Calm • Focus • Deep Sleep<br><span style="font-size: 1.2rem; color: var(--brand-blue); font-weight: 700; margin-top: 1rem; display: block;">पहले अनुभव करें, फिर कमाएँ</span></div>
            
            <div class="feature-pills">
                <div class="pill" style="background: rgba(0, 216, 255, 0.1); color: #fff; border-color: var(--brand-blue);">पहले 100 users – 20 मिनट FREE</div>
            </div>

            <button onclick="location.href='join.html'" class="btn-start" style="padding: 25px 80px;">FREE शुरू करें</button>
            
            <div style="margin-top: 4rem; font-size: 0.8rem; color: #fff; letter-spacing: 1px; font-weight: 700; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 8px;">
                Experience the power of digital frequency alignment.
            </div>
        </div>

        <!-- Visual Elements Decoration -->
        <div class="floating-elements">
            <div class="planet" style="width: 100px; height: 100px; top: 15%; right: 10%; background: radial-gradient(circle at 30% 30%, #444, #000); opacity: 0.4;"></div>
            <div class="planet" style="width: 60px; height: 60px; bottom: 20%; left: 15%; background: radial-gradient(circle at 30% 30%, #555, #000); opacity: 0.3;"></div>
            <div style="position: absolute; width: 200px; height: 2px; background: linear-gradient(90deg, transparent, var(--brand-blue), transparent); top: 50%; left: 0; opacity: 0.2; transform: rotate(-45deg);"></div>
        </div>
    </section>

    <footer class="main-footer">
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="terms.html">Terms & Conditions</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="dashboard.html">Member Hub</a>
        </div>
        <div class="copyright">
            Copyright © 2026 Sinaank Therapy. All Rights Reserved.
        </div>
    </footer>

    <script>
        if (localStorage.getItem('session')) {
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
