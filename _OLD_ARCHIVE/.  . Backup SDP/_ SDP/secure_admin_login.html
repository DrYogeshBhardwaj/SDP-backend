<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaank Digital Pause - Admin Access</title>
    <link rel="icon" href="assets/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        body {
            background-color: #0f172a;
            /* Dark background for distinction */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .auth-container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .admin-badge {
            background: #ef4444;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: inline-block;
        }
    </style>
</head>

<body>

    <!-- VAULT OVERLAY (Initial State) -->
    <div id="vault-overlay"
        class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900 text-white transition-transform duration-700">

        <div class="mb-8 flex flex-col items-center animate-fade-in-down">
            <div
                class="w-16 h-16 bg-gradient-to-br from-amber-400 to-orange-600 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-500/20 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1
                class="text-2xl font-bold tracking-widest uppercase text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-orange-400">
                Admin Vault</h1>
        </div>

        <!-- Display -->
        <div class="mb-8 w-64">
            <input type="password" id="vault-display" readonly
                class="w-full bg-slate-800/50 border-b-2 border-slate-600 text-center text-3xl font-mono tracking-[1em] py-2 text-amber-400 focus:outline-none focus:border-amber-500 transition-colors placeholder-slate-700"
                placeholder="••••••">
        </div>

        <!-- Keypad -->
        <div class="grid grid-cols-3 gap-4 w-64 mb-8">
            <button onclick="pressKey(1)"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-slate-700 active:bg-amber-500 text-xl font-bold transition-all shadow-lg border border-slate-700">1</button>
            <button onclick="pressKey(2)"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-slate-700 active:bg-amber-500 text-xl font-bold transition-all shadow-lg border border-slate-700">2</button>
            <button onclick="pressKey(3)"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-slate-700 active:bg-amber-500 text-xl font-bold transition-all shadow-lg border border-slate-700">3</button>

            <button onclick="pressKey(4)"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-slate-700 active:bg-amber-500 text-xl font-bold transition-all shadow-lg border border-slate-700">4</button>
            <button onclick="pressKey(5)"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-slate-700 active:bg-amber-500 text-xl font-bold transition-all shadow-lg border border-slate-700">5</button>
            <button onclick="pressKey(6)"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-slate-700 active:bg-amber-500 text-xl font-bold transition-all shadow-lg border border-slate-700">6</button>

            <button onclick="pressKey(7)"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-slate-700 active:bg-amber-500 text-xl font-bold transition-all shadow-lg border border-slate-700">7</button>
            <button onclick="pressKey(8)"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-slate-700 active:bg-amber-500 text-xl font-bold transition-all shadow-lg border border-slate-700">8</button>
            <button onclick="pressKey(9)"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-slate-700 active:bg-amber-500 text-xl font-bold transition-all shadow-lg border border-slate-700">9</button>

            <button onclick="clearVault()"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-red-900/50 text-red-400 font-bold transition-all shadow-lg border border-slate-700 flex items-center justify-center">C</button>
            <button onclick="pressKey(0)"
                class="w-16 h-16 rounded-full bg-slate-800 hover:bg-slate-700 active:bg-amber-500 text-xl font-bold transition-all shadow-lg border border-slate-700">0</button>
            <button onclick="unlockVault()"
                class="w-16 h-16 rounded-full bg-amber-600 hover:bg-amber-500 text-white font-bold transition-all shadow-lg shadow-amber-900/50 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </div>

        <div class="text-slate-500 text-xs tracking-widest uppercase">Secure Access Terminal</div>
    </div>


    <!-- LOGIN CONTENT (Hidden initially) -->
    <div id="login-container" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="card p-8 shadow-2xl max-w-sm w-full relative z-10 glass-effect border-t-4 border-primary">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">SDP <span class="text-primary">Admin</span>
                </h1>
                <p class="text-muted mt-2">Authorized Personnel Only</p>
            </div>

            <!-- Role Selection -->
            <div id="role-selection" class="flex flex-col gap-4">
                <div class="p-4 bg-blue-50 rounded-lg border border-blue-100 mb-2">
                    <p class="text-xs text-center text-blue-600 font-semibold uppercase mb-2">Select Access Level</p>

                    <button onclick="showLogin('ADMIN_B')"
                        class="btn btn-outline-primary w-full py-3 font-bold text-lg mb-3 hover:bg-blue-600 hover:text-white transition-all">
                        System Admin
                    </button>

                    <button onclick="showLogin('ADMIN_A')"
                        class="btn btn-primary w-full py-3 font-bold text-lg shadow-lg shadow-primary/30">
                        Finance Admin
                    </button>
                </div>
            </div>

            <!-- Actual Login Form -->
            <form id="loginForm" class="hidden flex-col gap-5" onsubmit="handleLogin(event)">
                <h3 id="login-title" class="text-center font-bold text-slate-700 -mt-2 mb-2">Login</h3>

                <div>
                    <label class="label">Admin Mobile</label>
                    <input type="tel" id="mobile" class="input font-mono text-lg" placeholder="999999999X" required
                        maxlength="10">
                </div>

                <div>
                    <label class="label">Security PIN</label>
                    <input type="password" id="pin" class="input font-mono text-lg" placeholder="••••" required
                        maxlength="4">
                </div>

                <button type="submit" class="btn btn-primary w-full font-bold shadow-lg shadow-primary/20 py-3">
                    Authenticate
                </button>
                <button type="button" onclick="resetView()" class="btn btn-text text-muted w-full text-sm">
                    Back to Selection
                </button>
            </form>

            <div id="error-msg" class="text-danger text-center mt-4 text-sm font-semibold hidden animate-shake"></div>
        </div>
    </div>

    <!-- Script -->
    <script src="js/store.js"></script>
    <script>
        // VAULT LOGIC
        const MASTER_CODE = '725653';
        let currentInput = '';
        const display = document.getElementById('vault-display');
        const vaultOverlay = document.getElementById('vault-overlay');
        const loginContainer = document.getElementById('login-container');

        // Check if already unlocked (OPTIONAL: For now we force lock every reload for security)
        // if (sessionStorage.getItem('vault_unlocked')) { ... }

        function pressKey(num) {
            if (currentInput.length < 6) {
                currentInput += num;
                updateDisplay();
            }
        }

        function clearVault() {
            currentInput = '';
            updateDisplay();
        }

        function updateDisplay() {
            display.value = currentInput;
        }

        function unlockVault() {
            // Check Master Code
            if (currentInput === MASTER_CODE) {
                // Success Animation
                display.classList.add('text-green-400');
                display.classList.remove('text-amber-400');

                setTimeout(() => {
                    // Unlock Transition
                    vaultOverlay.style.transform = 'translateY(-100%)';
                    loginContainer.classList.remove('hidden');
                }, 500);
            } else {
                // Error Animation
                display.classList.add('text-red-500', 'animate-pulse');
                setTimeout(() => {
                    display.classList.remove('text-red-500', 'animate-pulse');
                    clearVault();
                }, 500);
            }
        }

        // LOGIN LOGIC
        const roleSelection = document.getElementById('role-selection');
        const loginForm = document.getElementById('loginForm');
        const loginTitle = document.getElementById('login-title');
        const errorMsg = document.getElementById('error-msg');
        let targetRole = '';

        function resetView() {
            roleSelection.classList.remove('hidden');
            loginForm.classList.add('hidden');
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            errorMsg.classList.add('hidden');
        }

        function showLogin(role) {
            targetRole = role;
            roleSelection.classList.add('hidden');
            loginForm.classList.remove('hidden');
            loginForm.classList.add('flex');

            if (role === 'ADMIN_A') {
                loginTitle.innerText = "Finance Admin Login";
                document.getElementById('mobile').value = '9999999991';
            } else {
                loginTitle.innerText = "System Admin Login";
                document.getElementById('mobile').value = '9999999992';
            }
            document.getElementById('pin').focus();
        }

        function handleLogin(e) {
            e.preventDefault();
            const mobile = document.getElementById('mobile').value;
            const pin = document.getElementById('pin').value;
            const errorEl = document.getElementById('error-msg');

            try {
                if (!window.store) throw new Error("Database not loaded");

                const user = store.authenticate(mobile, pin);

                if (user) {
                    if (targetRole === 'ADMIN_A' && user.role !== 'ADMIN_A') {
                        throw new Error("This account is not authorized for Finance Admin.");
                    }
                    if (targetRole === 'ADMIN_B' && user.role !== 'ADMIN_B') {
                        throw new Error("This account is not authorized for System Admin.");
                    }

                    if (user.role === 'ADMIN_A') window.location.href = 'admin_finance.html';
                    else if (user.role === 'ADMIN_B') window.location.href = 'admin_system.html';
                } else {
                    errorEl.innerText = "Invalid Credentials";
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorEl.innerText = err.message;
                errorEl.classList.remove('hidden');
            }
        }
    </script>
</body>

</html>
