<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
</head>

<body class="bg-dark text-white">

    <nav class="navbar navbar-dark bg-secondary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">SDP - Admin Panel</span>
            <button id="logout-btn" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Admin Control Center</h1>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="payouts-tab" data-bs-toggle="tab" data-bs-target="#payouts"
                    type="button">Payout Requests</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="users-tab" data-bs-toggle="tab" data-bs-target="#users" type="button">User
                    Management</button>
            </li>
        </ul>

        <div class="tab-content" id="adminTabsContent">

            <!-- Payouts Tab -->
            <div class="tab-pane fade show active" id="payouts" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3>Payout Requests</h3>
                    <button class="btn btn-sm btn-outline-light" onclick="loadPayouts()">Refresh</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-dark table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>User (UID)</th>
                                <th>UPI ID</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="payouts-table-body">
                            <!-- Populated by JS -->
                            <tr>
                                <td colspan="6" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Users Tab -->
            <div class="tab-pane fade" id="users" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3>User Database</h3>
                    <div>
                        <select id="role-filter" class="form-select d-inline-block w-auto" onchange="loadUsers()">
                            <option value="all">All Roles</option>
                            <option value="buyer580">Buyer 580 (Seeder)</option>
                            <option value="buyer178">Buyer 178</option>
                            <option value="visitor">Visitor</option>
                        </select>
                        <button class="btn btn-sm btn-outline-light" onclick="loadUsers()">Refresh</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-dark table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Registered</th>
                                <th>Email / Name</th>
                                <th>Role</th>
                                <th>Wallet</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- Populated by JS -->
                            <tr>
                                <td colspan="6" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Payout Action Modal -->
    <div class="modal fade" id="payoutModal" tabindex="-1" style="color:black;">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Process Payout</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p><strong>User:</strong> <span id="modal-payout-user"></span></p>
                    <p><strong>Amount:</strong> ₹<span id="modal-payout-amount"></span></p>
                    <p><strong>UPI:</strong> <span id="modal-payout-upi" class="badge bg-secondary"></span></p>

                    <div class="mb-3">
                        <label class="form-label">Action</label>
                        <select id="modal-payout-action" class="form-select">
                            <option value="Paid">Mark as PAID (Deduct Wallet)</option>
                            <option value="Approved">Approve (Keep Pending)</option>
                            <option value="Rejected">Reject (No Deduction)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Admin Remark (Optional)</label>
                        <input type="text" id="modal-payout-remark" class="form-control"
                            placeholder="Transaction ID or Reason">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="modal-payout-confirm-btn">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- User Details Modal -->
    <div class="modal fade" id="userModal" tabindex="-1" style="color:black;">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Seeder Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="user-details-content">Loading...</div>
                    <hr>
                    <h6>Admin Override</h6>
                    <div class="mb-3">
                        <label class="form-label">Edit UPI ID</label>
                        <div class="input-group">
                            <input type="text" id="admin-edit-upi" class="form-control">
                            <button class="btn btn-outline-warning" id="admin-save-upi-btn">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="/__/firebase/9.6.1/firebase-app-compat.js"></script>
    <script src="/__/firebase/9.6.1/firebase-auth-compat.js"></script>
    <script src="/__/firebase/9.6.1/firebase-firestore-compat.js"></script>
    <script src="/__/firebase/init.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Auth Logic -->
    <script src="js/auth.js"></script>
    <script src="js/admin_panel.js"></script>
</body>

</html>
