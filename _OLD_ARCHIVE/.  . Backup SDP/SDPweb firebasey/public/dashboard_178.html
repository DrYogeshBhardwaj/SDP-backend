<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer 178 Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
</head>

<body class="bg-white">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">SDP - Buyer 178</span>
            <button id="logout-btn" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Welcome, Buyer 178</h1>
        <p>This is your protected dashboard. Use your break minutes wisely.</p>

        <div id="minutes-display">Loading Wallet...</div>

        <div id="break-buttons" class="mt-4">
            <h3>Take a Break</h3>
            <button class="btn btn-lg btn-success break-btn m-2" data-cost="2">2 Minutes</button>
            <button class="btn btn-lg btn-warning break-btn m-2" data-cost="5">5 Minutes</button>
            <button class="btn btn-lg btn-danger break-btn m-2" data-cost="10">10 Minutes</button>
        </div>

        <div id="timer-display" style="display:none;" class="mt-4 text-center">
            <h2 class="display-1" id="timer-text">00:00</h2>
            <p>Enjoy your break!</p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="/__/firebase/9.6.1/firebase-app-compat.js"></script>
    <script src="/__/firebase/9.6.1/firebase-auth-compat.js"></script>
    <script src="/__/firebase/9.6.1/firebase-firestore-compat.js"></script>
    <script src="/__/firebase/init.js"></script>

    <!-- Logic -->
    <script src="js/auth.js"></script>
    <script src="js/dashboard_178.js"></script>
</body>

</html>
