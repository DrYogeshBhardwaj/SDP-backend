<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDP - FACTORY RESET</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #fee2e2;
            color: #991b1b;
            text-align: center;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }

        button {
            background: #b91c1c;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 1.5rem;
            font-weight: bold;
        }

        button:hover {
            background: #991b1b;
        }

        .warning {
            background: #fef2f2;
            border: 1px solid #fecaca;
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 0.5rem;
            color: #7f1d1d;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>⚠️ FACTORY RESET</h1>
        <p>This is the last resort. Use this only if the app is completely frozen and other repair tools didn't work.
        </p>

        <div class="warning">
            <strong>WARNING:</strong> This will delete ALL users, transactions, and settings. You will lose everything
            and start fresh.
        </div>

        <button onclick="factoryReset()">DELETE EVERYTHING & RESET</button>
        <p id="status" style="margin-top: 1rem;"></p>
        <br>
        <a href="index.html" style="color: #666;">Cancel and go back</a>
    </div>

    <script>
        function factoryReset() {
            if (confirm("ARE YOU SURE? This cannot be undone.")) {
                if (confirm("REALLY DELETE ALL DATA? Type 'YES' to confirm.")) {
                    try {
                        localStorage.clear();
                        document.getElementById('status').textContent = "System Wiped. Reloading...";
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } catch (e) {
                        alert("Error: " + e.message);
                    }
                }
            }
        }
    </script>
</body>

</html>
