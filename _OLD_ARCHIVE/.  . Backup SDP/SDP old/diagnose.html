<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDP Diagnostic Tool</title>
    <style>
        body { font-family: monospace; padding: 2rem; background: #fdf2f8; color: #831843; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        .status-ok { color: green; font-weight: bold; }
        .status-err { color: red; font-weight: bold; }
        button { padding: 10px 20px; cursor: pointer; background: #be185d; color: white; border: none; border-radius: 4px; font-size: 1rem; margin-top: 10px; }
        button:hover { background: #9d174d; }
    </style>
</head>
<body>
    <h1>SDP Diagnostic Tool</h1>
    <p>Run this checks to see why the app might be freezing.</p>

    <div class="card">
        <h3>1. LocalStorage Check</h3>
        <div id="ls-status">Running...</div>
        <ul id="ls-details"></ul>
        <button onclick="clearStorage()">⚠️ WIPE ALL DATA & RESET</button>
    </div>

    <div class="card">
        <h3>2. Global Error Log</h3>
        <div id="global-errors">No errors captured yet.</div>
    </div>

    <script>
        function log(id, msg, isError = false) {
            const el = document.getElementById(id);
            const item = document.createElement('div');
            item.textContent = msg;
            item.style.color = isError ? 'red' : 'green';
            el.appendChild(item);
        }

        // Check LocalStorage
        try {
            const keys = ['ssb_users', 'ssb_transactions', 'ssb_session', 'ssb_feedback', 'ssb_store_version'];
            const list = document.getElementById('ls-details');
            
            keys.forEach(key => {
                const val = localStorage.getItem(key);
                const li = document.createElement('li');
                if (!val) {
                    li.textContent = `${key}: MISSING/NULL (OK if fresh)`;
                    li.style.color = 'orange';
                } else {
                    try {
                        JSON.parse(val);
                        li.textContent = `${key}: OK (${val.length} bytes)`;
                        li.style.color = 'green';
                    } catch (e) {
                        li.textContent = `${key}: CORRUPTED JSON! -> ${e.message}`;
                        li.style.color = 'red';
                    }
                }
                list.appendChild(li);
            });
            document.getElementById('ls-status').textContent = "Scan Complete.";
        } catch (e) {
            document.getElementById('ls-status').textContent = "Error scanning Storage: " + e.message;
        }

        function clearStorage() {
            if(confirm("Confirm: This will delete ALL users, transactions, and settings. App will start fresh.")) {
                localStorage.clear();
                alert("Storage Cleared. Redirecting to App...");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
