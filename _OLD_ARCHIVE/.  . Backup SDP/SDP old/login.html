<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sinaank Digital Pause</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-surface">

    <!-- Simple Header -->
    <header style="padding: 1rem 0; text-align: center; position: relative;">
        <img src="assets/logo.png" alt="SDP Logo" style="height: 40px;">
        <div id="lang-switch" style="position: absolute; right: 1rem; top: 1rem;"></div>
    </header>

    <main class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">

        <div class="auth-container">
            <h2 class="text-center text-primary mb-2" data-i18n="login.title">Login</h2>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" data-i18n="login.mobile">Mobile Number</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" value="+91" class="form-input" style="width: 60px; text-align: center;"
                            readonly>
                        <input type="tel" id="login-mobile" class="form-input" placeholder="Enter Mobile" required
                            maxlength="10" style="flex: 1;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" data-i18n="login.cid">Select Account ID</label>
                    <select id="login-cid" class="form-input" required>
                        <option value="" disabled selected>Enter mobile first...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" data-i18n="login.pin">4-Digit PIN</label>
                    <input type="password" id="login-pin" class="form-input" placeholder="****" maxlength="4" required>
                </div>

                <button type="submit" class="btn btn-primary w-full mt-1">Secure Login</button>

                <div class="text-center mt-2">
                    <a href="index.html" class="text-sm text-muted">Back to Home</a>
                </div>
            </form>
        </div>

    </main>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/validator.js"></script>
</body>

</html>
