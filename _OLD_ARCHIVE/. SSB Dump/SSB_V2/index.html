<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sinaank Screen Break | V2</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="app">

        <!-- MAIN DASHBOARD (Always in DOM) -->
        <main id="main-dashboard" class="fade-in">

            <!-- Header -->
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <h1 class="text-gradient-gold" style="font-size: 1.5rem; margin:0;">SINAANK</h1>
                    <div class="text-small text-muted" id="dash-date">Digital Wellness</div>
                </div>
                <!-- Profile / Settings Icon -->
                <div style="width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;"
                    onclick="SSBApp.openSettings()">
                    ⚙️
                </div>
            </header>

            <!-- Greeting Card -->
            <section class="card"
                style="background: linear-gradient(135deg, rgba(20,30,45,0.95), rgba(0,0,0,1)); border-color: var(--color-primary-glow);">
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <div class="text-small text-muted">Welcome Back,</div>
                        <h2 id="dash-name" style="font-size: 1.8rem; line-height: 1.2;">Guest</h2>
                    </div>
                    <div id="status-indicator"
                        style="width: 10px; height: 10px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00;">
                    </div>
                </div>

                <!-- Stats Grid -->
                <div style="display: flex; gap: 15px; margin-top: 25px;">
                    <!-- Namank -->
                    <div style="flex: 1; text-align: center;">
                        <div class="text-small text-muted" style="margin-bottom: 5px;">Namank</div>
                        <div id="val-namank" style="font-size: 2.5rem; font-weight: 800; color: #fff;">-</div>
                        <div id="lbl-namank" class="text-small" style="opacity: 0.7;">Unknown</div>
                    </div>
                    <!-- Divider -->
                    <div style="width: 1px; background: rgba(255,255,255,0.1);"></div>
                    <!-- Mobaank -->
                    <div style="flex: 1; text-align: center;">
                        <div class="text-small text-muted" style="margin-bottom: 5px;">Mobaank</div>
                        <div id="val-mobaank" style="font-size: 2.5rem; font-weight: 800; color: #fff;">-</div>
                        <div id="lbl-mobaank" class="text-small" style="opacity: 0.7;">Unknown</div>
                    </div>
                </div>
            </section>

            <!-- Action Section -->
            <section class="card"
                style="background: rgba(255, 215, 0, 0.03); border: 1px dashed rgba(255, 215, 0, 0.2);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3>Digital Break</h3>
                    <span class="text-small text-muted">v2.0</span>
                </div>

                <button class="btn btn-primary" onclick="alert('Starting 2 Minute Break...')"
                    style="margin-bottom: 10px;">
                    ▶ Start Session (2 min)
                </button>
                <div class="text-small text-muted" style="text-align: center;">
                    Syncs your <span style="color: var(--color-secondary);">Bio-Rhythm</span> with Digital Light
                </div>
            </section>

            <!-- Info Footer -->
            <div style="text-align: center; margin-top: 30px; opacity: 0.5;">
                <p class="text-small">Sinaank Screen Break V2</p>
            </div>

        </main>

        <!-- SETUP OVERLAY (Shown if no user) -->
        <div id="setup-overlay" class="fade-in"
            style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px;">

            <div class="card" style="width: 100%; max-width: 400px; border: 1px solid var(--color-primary);">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 2.5rem; margin-bottom: 10px;">🧬</div>
                    <h2>Setup Profile</h2>
                    <p class="text-muted">Enter details to calibrate your dashboard.</p>
                </div>

                <div class="input-group">
                    <label class="label">Full Name</label>
                    <input type="text" id="inp-name" class="input-field" placeholder="e.g. Poonam Sharma">
                </div>

                <div class="input-group">
                    <label class="label">Mobile Number</label>
                    <input type="tel" id="inp-mobile" class="input-field" placeholder="e.g. 98XXXXXXXX" maxlength="10">
                </div>

                <button onclick="SSBApp.processInput()" class="btn btn-primary" style="margin-bottom: 15px;">
                    Calibrate & Enter ➜
                </button>

                <p class="text-small text-muted" style="text-align: center; cursor: pointer;"
                    onclick="SSBApp.loadDemo()">
                    [Dev: Load Demo Data]
                </p>
            </div>
        </div>

    </div>

    <!-- Logic -->
    <script src="js/app.js"></script>
</body>

</html>
