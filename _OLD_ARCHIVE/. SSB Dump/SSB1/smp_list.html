<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSB | SMP Management</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            font-size: 1.5rem;
            color: #ffd700;
        }

        .btn-back {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #555;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
        }

        .btn-back:hover {
            background: #333;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            color: #aaa;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1rem;
        }

        .tab-btn.active {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            border-color: #ffd700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
        }

        .section-view {
            display: none;
        }

        .section-view.active {
            display: block;
        }

        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="title">🌿 Safe Money Plant (SMP)</div>
        <a href="admin.html" class="btn-back">← Back to Admin Panel</a>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('active')">Active Network</button>
        <button class="tab-btn" onclick="showTab('pending')">Pending Requests</button>
    </div>

    <!-- VIEW: ACTIVE NETWORK -->
    <div id="view-active" class="section-view active">
        <h3 style="color:#00e676;">Active SMP Partners</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Mobile</th>
                    <th>PIN</th>
                    <th>Joined</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="active-body"></tbody>
        </table>
        <div id="no-active" style="text-align:center; color:#666; display:none;">No active SMP partners found.</div>
    </div>

    <!-- VIEW: PENDING REQUESTS -->
    <div id="view-pending" class="section-view">
        <h3 style="color:#ffd700;">Pending Applications</h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Mobile</th>
                    <th>Details</th>
                    <th>Photo</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="pending-body"></tbody>
        </table>
        <div id="no-pending" style="text-align:center; color:#666; display:none;">No pending requests.</div>
    </div>

    <script src="js/ssb.js"></script>
    <script>
        // AUTH CHECK
        if (!sessionStorage.getItem('ssb_admin_logged_in')) {
            window.location.href = 'admin.html';
        }

        function showTab(tab) {
            document.querySelectorAll('.section-view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById('view-' + tab).classList.add('active');
            // Assuming tab order: Active=0, Pending=1
            document.querySelectorAll('.tab-btn')[tab === 'active' ? 0 : 1].classList.add('active');

            renderSMPPage();
        }

        function getLocal(key) {
            return JSON.parse(localStorage.getItem(key) || '{}');
        }
        function setLocal(key, val) {
            localStorage.setItem(key, JSON.stringify(val));
        }

        function renderSMPPage() {
            try {
                // Ensure IDs
                if (window.SSBLogic && window.SSBLogic.ensureSMPIds) {
                    window.SSBLogic.ensureSMPIds();
                }

                let list = getLocal('ssb_smp_list');
                const sellers = getLocal('ssb_authorized_sellers');

                // 1. RENDER ACTIVE
                const activeBody = document.getElementById('active-body');
                activeBody.innerHTML = '';
                let activeCount = 0;

                Object.values(list).forEach(s => {
                    if (s.status === 'ACTIVE') {
                        activeCount++;
                        // Fallback ID for Founder
                        if (!s.smpId && s.mobile === '8851168290') s.smpId = 'S1001';

                        const pin = (sellers[s.mobile] && sellers[s.mobile].pin) ? sellers[s.mobile].pin : 'N/A';

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong style="color: #00e676;">${s.smpId || 'Pending...'}</strong></td>
                            <td>${s.name}</td>
                            <td>${s.mobile}</td>
                            <td style="font-family:monospace; color:#ffd700;">${pin}</td>
                            <td>${new Date(s.approvedDate || s.date).toLocaleDateString()}</td>
                            <td><span style="color:#00e676; border:1px solid #00e676; padding:2px 6px; border-radius:4px; font-size:0.8rem;">ACTIVE</span></td>
                        `;
                        activeBody.appendChild(tr);
                    }
                });
                document.getElementById('no-active').style.display = activeCount === 0 ? 'block' : 'none';

                // 2. RENDER PENDING
                const pendingBody = document.getElementById('pending-body');
                pendingBody.innerHTML = '';
                let pendingCount = 0;

                Object.values(list).forEach(s => {
                    if (s.status === 'PENDING') {
                        pendingCount++;
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${s.name}</td>
                            <td>${s.mobile}</td>
                            <td style="font-size:0.9rem;">
                                Addr: ${s.address || '-'}<br>
                                PIN: ${s.pincode || '-'}<br>
                                Aadhar: ${s.aadhar || '-'}
                            </td>
                            <td>
                                <a href="${s.photo}" target="_blank" style="color:#ffd700;">View Photo</a>
                            </td>
                            <td>
                                <button class="action-btn" onclick="approveSMP('${s.mobile}')" style="background:#00e676; color:#000;">Approve</button>
                                <button class="action-btn" onclick="rejectSMP('${s.mobile}')" style="background:#ff3333; color:#fff; margin-left:5px;">Reject</button>
                            </td>
                        `;
                        pendingBody.appendChild(tr);
                    }
                });
                document.getElementById('no-pending').style.display = pendingCount === 0 ? 'block' : 'none';

            } catch (e) {
                console.error(e);
                alert("Error rendering SMP: " + e.message);
            }
        }

        window.approveSMP = function (mobile) {
            let list = getLocal('ssb_smp_list');
            if (list[mobile]) {
                list[mobile].status = 'ACTIVE';
                list[mobile].approvedDate = Date.now();
                setLocal('ssb_smp_list', list);

                // ALSO ADD TO SELLERS IF NOT EXISTS
                let sellers = getLocal('ssb_authorized_sellers');
                if (!sellers[mobile]) {
                    sellers[mobile] = {
                        name: list[mobile].name,
                        joined: Date.now(),
                        status: 'ACTIVE',
                        pin: '1234'
                    };
                    setLocal('ssb_authorized_sellers', sellers);
                }

                alert("Approved!");
                renderSMPPage();
            }
        };

        window.rejectSMP = function (mobile) {
            if (confirm("Reject this application?")) {
                let list = getLocal('ssb_smp_list');
                delete list[mobile];
                setLocal('ssb_smp_list', list);
                renderSMPPage();
            }
        };

        // Initial Load
        renderSMPPage();

    </script>
</body>

</html>
