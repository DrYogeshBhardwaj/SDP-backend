<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Wellness Session</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            transition: background 1s ease;
            /* Premium Background */
            background: radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes breathe {
            0% {
                transform: scale(1);
                opacity: 0.8;
                box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
                box-shadow: 0 0 60px rgba(0, 240, 255, 0.6);
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
                box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            }
        }

        .breathe-circle {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            /* Glassmorphism */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: breathe 8s infinite ease-in-out;
            position: relative;
        }

        .freq-label {
            position: absolute;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .left-label {
            left: -80px;
            top: 50%;
        }

        .right-label {
            right: -80px;
            top: 50%;
        }

        #timer {
            font-size: 3.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 200;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .controls {
            position: absolute;
            bottom: 60px;
            display: flex;
            gap: 25px;
            z-index: 10;
        }

        .btn-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .btn-circle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            border-color: #fff;
        }

        /* Glass Overlay */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Premium Glass Dark */
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(15px);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .overlay-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        .text-highlight {
            background: linear-gradient(90deg, #00f0ff, #00ff99);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .text-muted {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div id="visual-container" class="breathe-circle">
        <div id="timer">01:00</div>
        <!-- Still show visual frequencies for placebo/info effect -->
        <div class="freq-label left-label">L: <span id="lbl-left">-</span> Hz</div>
        <div class="freq-label right-label">R: <span id="lbl-right">-</span> Hz</div>
    </div>

    <div class="controls">
        <button class="btn-circle" onclick="toggleAudio()" id="btn-audio">🔊</button>
        <button class="btn-circle" onclick="exitSession()"
            style="font-size: 0.8rem; line-height: 1.2;">EXIT<br>⌂</button>
    </div>

    <!-- Instructions Overlay -->
    <div id="start-overlay">
        <div class="overlay-card">
            <h1 class="text-highlight" style="margin-bottom: 20px;" data-i18n="title">Digital Wellness Session</h1>

            <div style="display:flex; justify-content:center; gap:40px; margin-bottom:30px;">
                <div style="text-align:center;">
                    <div style="font-size:2.5rem; margin-bottom:5px;">🎧</div>
                    <div class="text-muted" data-i18n="play_left_ear">Left Ear</div>
                    <div id="val-left" style="color:#00f0ff; font-weight:bold; font-size:1.1rem;">-</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:2.5rem; margin-bottom:5px;">🎧</div>
                    <div class="text-muted" data-i18n="play_right_ear">Right Ear</div>
                    <div id="val-right" style="color:#00ff99; font-weight:bold; font-size:1.1rem;">-</div>
                </div>
            </div>

            <p style="font-size: 0.95rem; color: rgba(255,255,255,0.8); margin-bottom: 25px; line-height: 1.6;"
                data-i18n="sess_prog">
                Session in progress…<br>Relax your eyes and mind.
            </p>

            <p class="text-muted mb-20 text-center" style="margin-bottom: 30px;">
                🎧 <strong>Use Earphones for Best Results</strong>
            </p>

            <button class="btn-primary"
                style="width:100%; padding:15px; background: linear-gradient(90deg, #00f0ff, #00ff99); color:#000; border:none; font-weight:bold; border-radius:10px; cursor:pointer; font-size:1rem;"
                onclick="startSession()" data-i18n="play_initiate">Initiate Session</button>

            <button class="btn-secondary"
                style="width:100%; margin-top:15px; padding:12px; background: transparent; border:1px solid rgba(255,255,255,0.2); color:#aaa; border-radius:10px; cursor:pointer;"
                onclick="window.location.href='course.html'">
                Back to Dashboard
            </button>
        </div>
    </div>

    <!-- AUDIO ELEMENT (Hidden) -->
    <audio id="main-audio" loop preload="auto"></audio>

    <script src="js/lang.js"></script>
    <script src="js/ssb.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // FORCE DEFAULT TO ENGLISH if not set, instead of 'hi' logic elsewhere
            const saved = localStorage.getItem('ssb_lang');
            if (!saved) localStorage.setItem('ssb_lang', 'en');
            const savedLang = localStorage.getItem('ssb_lang') || 'hi';
            if (typeof setLanguage === 'function') setLanguage(savedLang);
        });

        let timerInterval;
        let timeLeft = 60;
        let session = null;
        let durationMinutes = 1;

        // Session Load
        if (typeof SSBLogic !== 'undefined') session = SSBLogic.getSession();
        if (!session) {
            const up = new URLSearchParams(window.location.search);
            const refS = up.get('ref_s');
            if (refS) {
                try {
                    const decoded = JSON.parse(decodeURIComponent(refS));
                    if (decoded && decoded.p) {
                        const h = SSBLogic.checkHistoryStatus(decoded.p);
                        if (h.found && h.data) {
                            session = SSBLogic.generateUserTheme(h.data.name || "User", decoded.p, "+91");
                            SSBLogic.saveSession(session);
                        }
                    }
                } catch (e) { }
            }
        }

        if (session) {
            const circle = document.querySelector('.breathe-circle');
            if (circle && session.mixColor) circle.style.background = session.mixColor;

            const params = new URLSearchParams(window.location.search);
            durationMinutes = parseInt(params.get('d')) || 1;
            timeLeft = durationMinutes * 60;

            const fL = (session.left && session.left.note) ? session.left.note : 417;
            const fR = (session.right && session.right.note) ? session.right.note : 528;

            const elL = document.getElementById('lbl-left'); if (elL) elL.textContent = fL;
            const elR = document.getElementById('lbl-right'); if (elR) elR.textContent = fR;
            const elValL = document.getElementById('val-left'); if (elValL) elValL.textContent = fL + ' Hz';
            const elValR = document.getElementById('val-right'); if (elValR) elValR.textContent = fR + ' Hz';

            setTimeout(updateTimerDisplay, 100);
        }

        window.startSession = function () {
            // DEBUG: Check Environment
            if (typeof SSBLogic === 'undefined') {
                console.error("SSBLogic is undefined! Scripts not loaded?");
                alert("System Error: internal_logic_missing. Please reload.");
                return;
            }

            // 1. Recover Session if missing (Correction for "Session Error")
            if (!session) {
                console.warn("Session missing, attempting recovery...");
                session = SSBLogic.getSession();

                if (!session) {
                    // Try looking up via 'ssb_last_active' if we had one (we don't yet, but good practice)
                    const raw = localStorage.getItem('ssb_session');
                    if (raw) {
                        try { session = JSON.parse(raw); } catch (e) { }
                    }
                }
            }

            if (!session) {
                // Last ditch: debug info
                const lsKeys = Object.keys(localStorage).join(',');
                console.log("LS Keys:", lsKeys);
                return alert("Session Error: Not Logged In. Please go back to Dashboard.");
            }

            // 1. DETERMINE FILE PATH
            // KIT1 -> sound_kit_1.mp3
            // KIT2 -> sound_kit_2.mp3
            // KIT3 -> sound_kit_3.mp3
            let kitId = '1';
            if (session.kitId) {
                kitId = session.kitId.replace('KIT', ''); // "1", "2", "3"
            }
            const audioPath = `assets/audio/sound_kit_${kitId}.mp3`;
            console.log("Loading Audio:", audioPath);

            const audioEl = document.getElementById('main-audio');
            if (audioEl) {
                audioEl.src = audioPath;
                audioEl.volume = 1.0;

                // Play Promise
                audioEl.play().then(() => {
                    console.log("Playback Started");
                    launch();
                }).catch(e => {
                    console.error("Playback Failed", e);
                    // Try fallback to generic if specific kit missing
                    if (audioPath.includes('sound_kit_')) {
                        console.log("Trying generic fallback...");
                        audioEl.src = 'assets/audio/12.mp3'; // Fallback to a known file
                        audioEl.play().then(launch).catch(err => {
                            alert("Audio file not found or blocked. Please check volume.");
                            launch(); // Launch anyway visually
                        });
                    } else {
                        alert("Audio Error: " + e.message);
                        launch();
                    }
                });
            } else {
                launch();
            }
        };

        function launch() {
            try { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); } catch (e) { }
            const overlay = document.getElementById('start-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    startTimer();
                }, 500);
            }
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) stopAudio();
            }, 1000);
        }

        function updateTimerDisplay() {
            if (timeLeft < 0) timeLeft = 0;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const display = document.getElementById('timer');
            if (display) display.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function stopAudio() {
            const audioEl = document.getElementById('main-audio');
            if (audioEl) { audioEl.pause(); audioEl.currentTime = 0; }
            clearInterval(timerInterval);
            window.location.href = `session-complete.html?m=${durationMinutes}`;
        }

        window.exitSession = function () {
            if (confirm("End Session?")) { stopAudio(); window.location.href = 'course.html'; }
        }

        window.toggleAudio = function () {
            const audioEl = document.getElementById('main-audio');
            if (audioEl) {
                const v = audioEl.volume;
                const btn = document.getElementById('btn-audio');
                if (v > 0.6) { audioEl.volume = 0.5; if (btn) btn.textContent = "🔉"; }
                else if (v > 0.3) { audioEl.volume = 0.2; if (btn) btn.textContent = "🔈"; }
                else { audioEl.volume = 1.0; if (btn) btn.textContent = "🔊"; }
            }
        }

        history.pushState(null, null, location.href);
        window.onpopstate = () => history.go(1);
        document.addEventListener('contextmenu', e => e.preventDefault());

    </script>
</body>

</html>
