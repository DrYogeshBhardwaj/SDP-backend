<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SDP</title>
    <link rel="stylesheet" href="../assets/css/theme.css">
</head>

<body>
    <div class="container mt-3">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h1 class="text-center">Create SDP Account</h1>
            <div id="error-message" class="alert alert-error"></div>
            <div id="success-message" class="alert alert-success"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label for="mobileNumber">Mobile Number</label>
                    <input type="text" id="mobileNumber" class="form-control" required
                        placeholder="10-digit mobile number">
                </div>
                <div class="form-group">
                    <label for="pin">Create PIN</label>
                    <input type="password" id="pin" class="form-control" required placeholder="Secure PIN">
                </div>
                <div class="form-group">
                    <label for="referredBy">Referral Code (Optional)</label>
                    <input type="text" id="referredBy" class="form-control" placeholder="Referrer Mobile Number">
                </div>
                <button type="submit" class="btn btn-primary mt-1" id="register-btn">Register</button>
            </form>
            <div class="text-center mt-2">
                <a href="login.html">Already have an account? Login</a>
            </div>
            <div class="text-center mt-1">
                <a href="index.html">Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Centralized Utilities -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>

    <script>
        // Pre-fill fields logic
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        if (ref) document.getElementById('referredBy').value = ref;

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userData = {
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobileNumber').value,
                pin: document.getElementById('pin').value,
                referredBy: document.getElementById('referredBy').value || undefined
            };

            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            const submitBtn = document.getElementById('register-btn');

            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';

            try {
                await Auth.register(userData);
                successDiv.textContent = 'Registration successful! Payment registered.';
                successDiv.classList.add('show');

                alert("Account created successfully! Payment registered.\n\nPlease login from the main page to continue.");
                window.location.href = 'index.html';

            } catch (err) {
                errorDiv.textContent = err.message || 'Registration failed. Check your data.';
                errorDiv.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        });
    </script>
</body>

</html>
