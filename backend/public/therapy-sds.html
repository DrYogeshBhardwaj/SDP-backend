<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINAANK SDS — Deep Sleep Therapy</title>

<link rel="stylesheet" href="css/focus-mode.css">

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/theme-engine.js"></script>

<script src="js/sds_stories.js"></script>
<script src="js/sds_engine.js"></script>
<script src="js/personal_start_engine.js"></script>
<script src="js/focus-ui.js"></script>
<script src="js/i18n.js"></script>
<style>
    /* Demo Badge */
    .demo-badge {
        background: #ef4444;
        color: white;
        text-align: center;
        padding: 0.5rem;
        font-weight: 800;
        font-size: 0.8rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10000;
    }
</style>

</head>

<body class="auth-locked">
    <div class="demo-badge">Sinaank Demo Mode — Clinical Therapy Beta</div>

<div id="setup-screen">
    <div class="setup-inner">
        <div class="branding-tag">SINAANK · SDS</div>
        <h1 class="module-title" data-i18n="therapy.sds.title">गहरी नींद थेरेपी (Deep Sleep)</h1>
        <p class="module-subtitle" data-i18n="therapy.sds.subtitle">Personalized sleep-inducing frequencies and clinical narratives. Prepare for restorative rest.</p>
        
        <div class="btn-group">
            <button class="btn-start" id="btn-new" data-i18n="therapy.btn.start_new">नई थेरेपी शुरू करें</button>
            <button class="btn-secondary" id="btn-cont" data-i18n="therapy.btn.continue_prev">पिछली थेरेपी जारी रखें</button>
        </div>
    </div>
</div>

<div id="focus-root"></div>

<script>

async function beginSession(isNew){
    // --- MANDATORY CLICK AUDIO FIX ---
    try {
        const startSound = new Audio('/assets/audio/common/therapy_start.mp3');
        startSound.volume = 1.0;
        
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') await ctx.resume();
        
        await startSound.play();
        console.log("[Audio] Therapy Start Sound Played");
    } catch (err) {
        console.warn("[Audio] Blocked or failed", err);
    }
    // ---------------------------------

    const btnNew = document.getElementById('btn-new');
    const btnCont = document.getElementById('btn-cont');
    
    if (btnNew) { btnNew.disabled = true; btnNew.textContent = "🌙 तैयार हो रहा है..."; }
    if (btnCont) { btnCont.disabled = true; }

    console.log('[SDS] beginSession() called, isNew:', isNew)
    
    // INIT AUDIO ENGINE
    if(window.SDSEngine){
        await window.SDSEngine.init()
    }
    
    // START UI
    await FocusUIController.setup({
        module:'SDS',
        isNew: isNew
    })
    
    if(window.SDSEngine){
        window.SDSEngine.startFlow()
    }
}

// Add event listeners for CSP compliance
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('btn-new')?.addEventListener('click', () => beginSession(true));
    document.getElementById('btn-cont')?.addEventListener('click', () => beginSession(false));

    // EXTRA SAFETY FALLBACK
    document.body.addEventListener("click", () => {
        const audio = new Audio('/assets/audio/common/therapy_start.mp3');
        audio.volume = 0.5;
        audio.play().catch(()=>{});
    }, { once: true });
});

console.log('[SDS] FocusUIController.setup() complete')

// allow direct open
sessionStorage.setItem('sinaank_intro','1')

</script>

</body>
</html>
