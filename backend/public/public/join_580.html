<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Sinaank Family Pack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="js/store.js?v=2026.3"></script>
    <script>
        // Safety Check
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof store === 'undefined' && !window.store) {
                console.error("CRITICAL: Window.store is undefined in join_580");
                alert("System Logic (Store) failed to load. Please refresh.");
                return;
            }
            console.log("Store verified in join_580");
        });
    </script>
    <script src="js/auth.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
        }

        .join-card {
            max-width: 400px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }

        .invite-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <nav class="flex items-center justify-center p-4 bg-white shadow-sm">
        <div class="flex items-center gap-2">
            <img src="assets/logo.png" alt="Sinaank Logo" class="h-8 w-auto" style="height: 32px;">
            <span class="font-bold text-lg text-slate-800">Sinaank Digital Pause</span>
        </div>
    </nav>

    <div class="join-card">
        <div id="invite-section" class="invite-box" style="display:none">
            Using Referral Code: <strong id="display-ref"></strong>
        </div>

        <h2 class="text-2xl font-bold text-center mb-1">Unlock Family Pack</h2>
        <p class="text-center text-muted mb-6">Register & Pay ₹580</p>

        <form id="joinForm" onsubmit="handleJoin(event)">
            <div class="form-group">
                <label class="form-label">Mobile Number</label>
                <input type="tel" id="mobile" class="form-input" placeholder="10-digit Mobile" maxlength="10" required>
            </div>

            <div class="form-group">
                <label class="form-label">Set 4-Digit Login PIN</label>
                <input type="password" id="pin" class="form-input" placeholder="****" maxlength="4" required>
            </div>

            <!-- Name Removed as per request -->

            <button type="submit" class="btn btn-primary w-full text-lg">Pay ₹580 & Join</button>
        </form>

        <p class="text-center mt-4 text-sm">
            Already have an account? <a href="login.html" class="text-primary font-bold">Login</a>
        </p>
    </div>

    <script>
        // 1. FORCE CLEAN SLATE ON LOAD
        window.addEventListener('load', () => {
            // Logout any existing user to prevent session leak
            store.logout();
            localStorage.removeItem('ssb_session');
            console.log("Session cleared for clean registration.");

            // Capture Ref logic
            const params = new URLSearchParams(window.location.search);
            const ref = params.get('ref');

            if (ref) {
                localStorage.setItem('join_ref', ref);
                document.getElementById('invite-section').style.display = 'block';
                document.getElementById('display-ref').textContent = ref;
            } else {
                // Check if we have one stored from buyer_580.html
                const storedRef = localStorage.getItem('sdp_ref_id');
                if (storedRef) {
                    document.getElementById('invite-section').style.display = 'block';
                    document.getElementById('display-ref').textContent = storedRef;
                }
            }
        });

        // 2. HANDLE JOIN
        function handleJoin(e) {
            e.preventDefault();
            const mobile = document.getElementById('mobile').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const name = "Member"; // Default name since field was removed

            // Validate
            if (!/^\d{10}$/.test(mobile)) { alert("Invalid Mobile Number"); return; }
            if (!/^\d{4}$/.test(pin)) { alert("PIN must be 4 digits"); return; }

            // Check existence
            if (store.getUser(mobile)) {
                alert("Account already exists! Please Login.");
                window.location.href = 'login.html';
                return;
            }

            try {
                // Create User
                const user = store.createUser({ mobile, pin, name });

                // Get Ref
                const refCode = localStorage.getItem('join_ref') || localStorage.getItem('sdp_ref_id');

                // Process Purchase (Mock Payment)
                if (confirm(`Simulator: Proceed with Payment of ₹580?`)) {
                    store.processPurchase(user.mobile, 'family', refCode);

                    // LOGIN AUTOMATICALLY with NEW USER
                    const newUser = store.authenticate(mobile, pin);
                    if (newUser) {
                        alert("Payment Successful! Welcome to SDP.");
                        window.location.href = 'dashboard_580.html';
                    } else {
                        // Should not happen
                        alert("Error logging in new user. Please login manually.");
                        window.location.href = 'login.html';
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            }
        }
    </script>
</body>

</html>
