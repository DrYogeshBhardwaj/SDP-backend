<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaank Digital Pause - Authentication</title>
    <link rel="icon" href="../assets/logo.png">
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --accent: #2dd4bf;
            --background: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--background);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(45, 212, 191, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: formReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes formReveal {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-container img {
            height: 50px;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .prefix-input {
            display: flex;
        }

        .prefix-input span {
            display: flex;
            align-items: center;
            padding: 0 1rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: var(--text-muted);
        }

        .prefix-input input {
            border-radius: 0 12px 12px 0;
        }

        .btn {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.6);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            display: none;
            animation: fadeIn 0.3s ease;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .hidden {
            display: none !important;
        }

        .step-container {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
            display: none;
            margin-left: 10px;
        }

        .btn.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="logo-container">
            <h1 style="font-size: 2rem; font-weight: 700; letter-spacing: 2px; color: var(--accent);">SDP</h1>
        </div>

        <div id="alert-box" class="alert"></div>

        <!-- STEP 1: MOBILE (SEND OTP) -->
        <div id="step-mobile" class="step-container">
            <div class="auth-header">
                <h2>Welcome</h2>
                <p>Enter your mobile number to get an OTP.</p>
            </div>
            
            <form id="form-mobile">
                <div class="form-group">
                    <label>Mobile Number</label>
                    <div class="prefix-input">
                        <span>+91</span>
                        <input type="tel" id="mobile" class="form-control" placeholder="10-digit number" maxlength="10" pattern="\d{10}" required autofocus>
                    </div>
                </div>
                <button type="submit" id="btn-send-otp" class="btn btn-primary">
                    Send OTP <div class="spinner"></div>
                </button>
            </form>
            <div style="text-align: center;">
                <a href="index.html" class="back-link">← Back to Home</a>
            </div>
            <!-- REMOVE register.html link, since everything happens here now -->
        </div>

        <!-- STEP 2: VERIFY OTP -->
        <div id="step-otp" class="step-container hidden">
            <div class="auth-header">
                <h2>Verify Mobile</h2>
                <p>Enter the 6-digit OTP sent to <span id="display-mobile" style="color: white; font-weight: 600;"></span></p>
            </div>
            
            <form id="form-otp">
                <div class="form-group">
                    <label>One Time Password</label>
                    <input type="text" id="otp" class="form-control" placeholder="Enter OTP" maxlength="6" required style="text-align: center; letter-spacing: 6px; font-weight: 600; font-size: 1.5rem;">
                </div>
                <button type="submit" id="btn-verify-otp" class="btn btn-primary">
                    Verify OTP <div class="spinner"></div>
                </button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="#" id="change-number" style="color: var(--text-muted); text-decoration: none; font-size: 0.95rem; display: block; margin-bottom: 0.5rem; transition: color 0.2s;">Wrong number? Change</a>
                <a href="#" id="resend-otp" style="color: var(--accent); text-decoration: none; font-size: 0.95rem; font-weight: 500;">Resend OTP</a>
            </div>
        </div>

        <!-- STEP 3: LOGIN PIN OR REGISTER -->
        <div id="step-final" class="step-container hidden">
            <div class="auth-header">
                <h2 id="final-title">Secure Login</h2>
                <p id="final-subtitle">Enter your 4-digit PIN.</p>
            </div>
            
            <form id="form-final">
                
                <!-- Registration Fields -->
                <div id="register-fields" class="hidden">
                    <div class="form-group hidden" id="referral-group">
                        <label>Referred By (Partner)</label>
                        <input type="text" id="referral-code" class="form-control" readonly style="background: rgba(45, 212, 191, 0.1); color: var(--accent); border-color: rgba(45, 212, 191, 0.3);">
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="Your Name">
                    </div>
                </div>

                <!-- PIN Field (Used for both Login and Register) -->
                <div class="form-group">
                    <label id="pin-label">4-Digit PIN</label>
                    <input type="password" id="pin" class="form-control" placeholder="****" maxlength="4" pattern="\d{4}" required style="text-align: center; letter-spacing: 12px; font-size: 1.8rem; padding: 0.8rem;">
                </div>

                <button type="submit" id="btn-final" class="btn btn-primary">
                    <span id="btn-final-text">Login</span> <div class="spinner"></div>
                </button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">
                By continuing, you agree to SDP's <a href="terms.html" style="color: var(--accent); text-decoration: none;">Terms & Conditions</a>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script>
        // Use relative path for API so it works smoothly on localhost or production
        const API_BASE_URL = '/api'; 
        
        let state = {
            mobile: '',
            sessionId: '',
            userExists: false,
            purchaseAmount: null,
            refCode: null
        };

        const els = {
            alert: document.getElementById('alert-box'),
            sMobile: document.getElementById('step-mobile'),
            sOtp: document.getElementById('step-otp'),
            sFinal: document.getElementById('step-final'),
            fMobile: document.getElementById('form-mobile'),
            fOtp: document.getElementById('form-otp'),
            fFinal: document.getElementById('form-final')
        };

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            state.purchaseAmount = params.get('amount');
            state.refCode = params.get('ref');
        });

        function showAlert(msg, isError = true) {
            els.alert.textContent = msg;
            els.alert.className = `alert ${isError ? 'alert-error' : 'alert-success'} show`;
            setTimeout(() => els.alert.classList.remove('show'), 5000);
        }

        // Handle OTP Send
        els.fMobile.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-send-otp');
            state.mobile = document.getElementById('mobile').value;
            
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: state.mobile })
                });
                const data = await res.json();
                
                if (res.ok) {
                    state.sessionId = data.data.sessionId;
                    document.getElementById('display-mobile').textContent = `+91 ${state.mobile}`;
                    els.sMobile.classList.add('hidden');
                    els.sOtp.classList.remove('hidden');
                    document.getElementById('otp').focus();
                } else {
                    showAlert(data.message || 'Failed to send OTP');
                }
            } catch (err) {
                showAlert('Network error. Check your connection.');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        // Verify OTP
        els.fOtp.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-verify-otp');
            const otp = document.getElementById('otp').value;
            
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: state.mobile, otp, sessionId: state.sessionId })
                });
                const data = await res.json();
                
                if (res.ok) {
                    state.userExists = data.data.userExists;
                    if (state.userExists && data.data.user) {
                        const role = data.data.user.role;
                        if (role.includes('ADMIN') || role === 'MASTER') window.location.href = '/dashboard/admin.html';
                        else if (role === 'SEEDER') window.location.href = '/dashboard/seeder.html';
                        else window.location.href = '/dashboard/user.html';
                    } else {
                        setupFinalStep();
                    }
                } else {
                    showAlert(data.message || 'Invalid OTP');
                }
            } catch (err) {
                showAlert('Network error verifying OTP');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        function setupFinalStep() {
            els.sOtp.classList.add('hidden');
            els.sFinal.classList.remove('hidden');

            if (state.userExists) {
                document.getElementById('final-title').textContent = "Welcome Back";
                document.getElementById('final-subtitle').textContent = "Enter your PIN to login securely.";
                document.getElementById('pin-label').textContent = "Login PIN";
                document.getElementById('btn-final-text').textContent = "Access Dashboard";
            } else {
                document.getElementById('final-title').textContent = "Create Account";
                document.getElementById('final-subtitle').textContent = "Set a secure PIN for future logins.";
                document.getElementById('pin-label').textContent = "Create 4-Digit PIN";
                document.getElementById('btn-final-text').textContent = state.purchaseAmount ? "Create & Pay" : "Create Account";
                
                document.getElementById('register-fields').classList.remove('hidden');
                document.getElementById('name').required = true;

                if (state.refCode) {
                    document.getElementById('referral-group').classList.remove('hidden');
                    document.getElementById('referral-code').value = state.refCode;
                }
            }
            document.getElementById('pin').focus();
        }

        // Final Submit (Register or Login)
        els.fFinal.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-final');
            const pin = document.getElementById('pin').value;
            
            btn.classList.add('loading');
            btn.disabled = true;

            if (state.userExists) {
                // LOGIN
                try {
                    const res = await fetch(`${API_BASE_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ mobile: state.mobile, pin })
                    });
                    const data = await res.json();
                    
                    if (res.ok) {
                        const role = data.data.user.role;
                        if (role.includes('ADMIN')) window.location.href = '/dashboard/admin.html';
                        else if (role === 'SEEDER') window.location.href = '/dashboard/seeder.html';
                        else window.location.href = '/dashboard/user.html';
                    } else {
                        showAlert(data.message || 'Invalid PIN');
                    }
                } catch (err) {
                    showAlert('Login request failed.');
                }
            } else {
                // REGISTER
                try {
                    const name = document.getElementById('name').value;
                    const reqBody = { mobile: state.mobile, pin, name, amount: state.purchaseAmount };
                    if (state.refCode) reqBody.referral_code = state.refCode;

                    const res = await fetch(`${API_BASE_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify(reqBody)
                    });
                    
                    if (res.ok) {
                        // Auto-login after successful registration
                        await fetch(`${API_BASE_URL}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify({ mobile: state.mobile, pin })
                        });
                        window.location.href = '/dashboard/user.html';
                    } else {
                        const data = await res.json();
                        showAlert(data.message || 'Registration failed');
                    }
                } catch (err) {
                    showAlert('Registration request failed.');
                }
            }

            btn.classList.remove('loading');
            btn.disabled = false;
        });

        // Navigation Handlers
        document.getElementById('change-number').addEventListener('click', (e) => {
            e.preventDefault();
            els.sOtp.classList.add('hidden');
            els.sMobile.classList.remove('hidden');
            document.getElementById('otp').value = '';
            document.getElementById('mobile').focus();
        });

        document.getElementById('resend-otp').addEventListener('click', (e) => {
            e.preventDefault();
            els.fMobile.dispatchEvent(new Event('submit'));
            showAlert("New OTP sent to your mobile.", false);
        });

    </script>
</body>
</html>
